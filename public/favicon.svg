<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" style="image-rendering:pixelated">
  <!-- Monitor body -->
  <rect x="1" y="2" width="22" height="14" fill="#808080"/>
  <rect x="2" y="3" width="20" height="12" fill="#dfdfdf"/>
  <!-- Screen -->
  <rect x="3" y="4" width="17" height="10" fill="#000080"/>
  <!-- Screen highlight top/left -->
  <rect x="3" y="4" width="17" height="1" fill="#0000dd"/>
  <rect x="3" y="4" width="1" height="10" fill="#0000dd"/>
  <!-- Window on screen -->
  <rect x="5" y="6" width="10" height="7" fill="#dfdfdf"/>
  <rect x="5" y="6" width="10" height="2" fill="#000080"/>
  <!-- Window titlebar buttons -->
  <rect x="13" y="7" width="1" height="1" fill="#dfdfdf"/>
  <!-- Window content lines -->
  <rect x="6" y="9" width="7" height="1" fill="#808080"/>
  <rect x="6" y="11" width="5" height="1" fill="#808080"/>
  <!-- Small window behind -->
  <rect x="9" y="5" width="8" height="6" fill="#c0c0c0"/>
  <rect x="9" y="5" width="8" height="2" fill="#000080"/>
  <!-- Monitor base neck -->
  <rect x="1" y="16" width="22" height="2" fill="#808080"/>
  <rect x="2" y="17" width="20" height="1" fill="#dfdfdf"/>
  <!-- Neck -->
  <rect x="8" y="18" width="6" height="2" fill="#808080"/>
  <rect x="9" y="19" width="4" height="1" fill="#dfdfdf"/>
  <!-- Base -->
  <rect x="5" y="20" width="12" height="2" fill="#808080"/>
  <rect x="6" y="20" width="10" height="1" fill="#dfdfdf"/>
  <!-- Tower/case -->
  <rect x="17" y="15" width="10" height="14" fill="#808080"/>
  <rect x="18" y="16" width="8" height="12" fill="#dfdfdf"/>
  <!-- Floppy drive slot -->
  <rect x="19" y="17" width="6" height="2" fill="#808080"/>
  <rect x="20" y="18" width="4" height="1" fill="#404040"/>
  <!-- CD drive slot -->
  <rect x="19" y="20" width="6" height="2" fill="#808080"/>
  <rect x="20" y="21" width="4" height="1" fill="#404040"/>
  <!-- Power light green -->
  <rect x="23" y="24" width="2" height="2" fill="#008000"/>
  <!-- Shadows/outlines -->
  <rect x="23" y="2" width="1" height="14" fill="#000000"/>
  <rect x="1" y="16" width="23" height="1" fill="#000000"/>
  <rect x="27" y="15" width="1" height="14" fill="#000000"/>
  <rect x="17" y="29" width="11" height="1" fill="#000000"/>
  <!-- Keyboard -->
  <rect x="1" y="23" width="14" height="5" fill="#c0c0c0"/>
  <rect x="1" y="23" width="14" height="1" fill="#dfdfdf"/>
  <rect x="1" y="23" width="1" height="5" fill="#dfdfdf"/>
  <rect x="14" y="23" width="1" height="5" fill="#808080"/>
  <rect x="1" y="27" width="14" height="1" fill="#808080"/>
  <!-- Keyboard keys rows -->
  <rect x="2" y="24" width="12" height="1" fill="#808080"/>
  <rect x="2" y="26" width="12" height="1" fill="#808080"/>
</svg>
